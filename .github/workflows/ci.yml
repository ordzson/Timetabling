name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: horarios
          POSTGRES_USER: usuario_horarios
          POSTGRES_PASSWORD: 1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U usuario_horarios -d horarios"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      HORARIOS_DB_URL: jdbc:postgresql://localhost:5432/horarios
      HORARIOS_DB_USER: usuario_horarios
      HORARIOS_DB_PASSWORD: 1234
      HORARIOS_AUTH_JWT_SECRET: ci-secret-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: horarios-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: horarios-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
