spring:
  application:
    name: horarios-api
  datasource:
    url: ${HORARIOS_DB_URL:jdbc:postgresql://localhost:5432/horarios}
    username: ${HORARIOS_DB_USER:usuario_horarios}
    password: ${HORARIOS_DB_PASSWORD:1234}
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
horarios:
  cors:
    allowed-origins: ${HORARIOS_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://localhost:*,http://127.0.0.1:*}
